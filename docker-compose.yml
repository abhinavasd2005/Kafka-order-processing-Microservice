services:

  mysql:
    image: mysql:8.4
    container_name: mysql

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:latest

    container_name: kafka

    restart: unless-stopped

    ports:
      - "29092:29092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    healthcheck:
      test:
        [
          "CMD",
          "/opt/kafka/bin/kafka-topics.sh",
          "--bootstrap-server",
          "localhost:9092",
          "--list"
        ]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest

    container_name: kafka-ui

    restart: unless-stopped

    depends_on:
      kafka:
        condition: service_healthy

    ports:
      - "8090:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  order-service:

    build: ./order-service

    container_name: order-service

    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

      kafka:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:

      DB_URL: jdbc:mysql://mysql:3306/order_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8

      DB_USERNAME: root

      DB_PASSWORD: root

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  payment-service:

    build: ./payment-service

    container_name: payment-service

    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

      kafka:
        condition: service_healthy

    environment:

      DB_URL: jdbc:mysql://mysql:3306/payment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8

      DB_USERNAME: root

      DB_PASSWORD: root

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  dlq-service:

    build: ./dlq-service

    container_name: dlq-service

    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

      kafka:
        condition: service_healthy

    ports:
      - "8081:8081"

    environment:

      DB_URL: jdbc:mysql://mysql:3306/dlq_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8

      DB_USERNAME: root

      DB_PASSWORD: root

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

volumes:

  mysql_data: